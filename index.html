<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    
    <!-- Adaptabilidad y zonas seguras (Notch) para iOS y Android -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Compatibilidad forzada para usar el motor de renderizado más moderno en navegadores basados en Chromium/Edge -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- Optimizaciones de App Web para Móviles (PWA) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    
       <!-- ==========================================
         METADATOS SEO Y PREVISUALIZADORES DE ENLACES
    =========================================== -->

    <!-- SEO Estándar -->
    <meta name="description" content="La página oficial de &quot;Masacre en Dascord&quot; donde unos inadaptados sociales se la pasan leyendo quien de nosotros matara Nahum en el siguiente cap">
    <meta name="keywords" content="Masacre en Dascord, fanfic, discord, web, videogame, juego">
    <meta name="author" content="Masacre en Dascord Team">

    <!-- Open Graph / Facebook / Discord / WhatsApp / Telegram / iMessage -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lorenz191211-tech.github.io/Masacre-en-dascord-web/">
    <meta property="og:title" content="Masacre en Dascord página web">
    <meta property="og:description" content="La página oficial de &quot;Masacre en Dascord&quot; donde unos inadaptados sociales se la pasan leyendo quien de nosotros matara nahum en el siguiente cap">
    
    <!-- IMPORTANTE: Usa una URL absoluta para la imagen (ej: 1200x200 píxeles para mejor resultado) -->
    <meta property="og:image" content="https://https://lorenz191211-tech.github.io/Masacre-en-dascord-web/assets/ui/preview.png">
    <meta property="og:image:secure_url" content="https://https://lorenz191211-tech.github.io/Masacre-en-dascord-web/assets/ui/preview.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="200">
    <meta property="og:site_name" content="Masacre en Dascord página web">
    <meta property="og:locale" content="es_ES">

    <!-- Twitter / X Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://lorenz191211-tech.github.io/Masacre-en-dascord-web/">
    <meta name="twitter:title" content="Masacre en Dascord página web">
    <meta name="twitter:description" content="La página oficial de &quot;Masacre en Dascord&quot; donde unos inadaptados sociales se la pasan leyendo quien de nosotros matara nahum en el siguiente cap">
    <meta name="twitter:image" content="https://lorenz191211-tech.github.io/Masacre-en-dascord-web/assets/ui/preview.png">


    <link rel="stylesheet" href="./css/style.css">
    
    <!-- Preloads (mantenidos para rendimiento) -->
    <link rel="preload" href="./js/config.json" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="./assets/shaders/humo.txt" as="fetch" crossorigin="anonymous">
</head>

<body>

    <!-- 1. CAPA DE FONDO: Canvas (Se dibuja al fondo del todo) -->
    <canvas id="smokeCanvas"></canvas>

    <!-- 2. CAPA DE EFECTO: Viñeta (Se dibuja sobre el canvas) -->
    <div id="vignette"></div>

    <!-- 3. CAPA DE INTERFAZ: Menú Principal y UI (Se dibuja sobre los fondos) -->
    <div class="mainMenu">
        <div class="title-container">
            <img src="./assets/ui/titulo.svg" class="game-logo" alt="Logo">
            <h2 id="game-subtitle" class="game-subtitle"></h2>
            <hr>
        </div>

        <div class="gameMenu">
            <button>FANFIC</button>
            <button>JUEGO</button>
            <button>ARCADE</button>
            <button>DISCORD</button>
            <button>CREDITOS</button>
        </div>
    </div>

    <!-- CONTROLES DE LA UI -->
    <div class="ui-controls">
        <!-- Botón de música -->
        <button id="music-btn" class="ui-btn" title="Música">
            <img id="music-icon" src="./assets/ui/musicoff.png" alt="Música">
        </button>
        
        <!-- Botón para TV Retro -->
        <button id="tv-btn" class="ui-btn" title="Activar/Desactivar TV Retro">
            <img id="tv-icon" src="./assets/ui/tv.png" alt="TV Retro">
        </button>
    </div>

    <!-- 4. CAPA FRONTAL: Efecto visual CRT (Cubre absolutamente todo) -->
    <div id="crt-overlay" class="crt-overlay"></div>

    <!-- SCRIPTS -->
    <script src="./js/audio.js" defer></script>
    <script src="./js/puntero.js" defer></script>
    <script src="./js/main.js" defer></script>
    <script src="./js/smokeshader.js" defer></script>

</body>

</html>
