<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    <title>Med Web</title>

    <link rel="stylesheet" href="./css/background.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preload" href="js/config.json" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="js/subtitulos.json" as="fetch" crossorigin="anonymous">
    <link rel="preload" href="assets/shaders/humo.txt" as="fetch" crossorigin="anonymous">
</head>

<body>

    <!-- MENÚ PRINCIPAL -->
    <div class="mainMenu">
        <div class="title-container">
    <img src="./assets/ui/titulo.svg" class="game-logo" alt="Logo">
    <h2 id="game-subtitle" class="game-subtitle"></h2>
    <hr>
</div>

        <div class="gameMenu">
            <button>DESCARGAR</button>
            <button>GUIA</button>
            <button>DISCORD</button>
            <button>VERSIONES</button>
            <button>CRÉDITOS</button>
        </div>

        
<!-- CONTROLES DE LA UI -->
<div class="ui-controls">
    <!-- Botón de música -->
    <button id="music-btn" class="ui-btn" title="Música">
        <img id="music-icon" src="./assets/ui/musicoff.png" alt="Música">
    </button>
    
    <!-- Botón para TV Retro -->
    <button id="tv-btn" class="ui-btn" title="Activar/Desactivar TV Retro">
        <img id="tv-icon" src="./assets/ui/tv.png" alt="TV Retro">
    </button>
</div>

<!-- Capa para el efecto visual de líneas de escaneo (CRT) -->
<div id="crt-overlay" class="crt-overlay"></div>

 <!-- Fondo en Canvas para simular el Shader exacto del juego -->
<canvas id="smokeCanvas"></canvas>

<div class="mainMenu">
    <!-- Tu menú aquí -->
</div>

    <script src="./js/audio.js" defer></script>
    <script src="./js/puntero.js" defer></script>
    <script src="./js/main.js" defer></script>
    <script src="./js/smokeshader.js" defer></script>

</body>

</html>
