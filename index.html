<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Adaptabilidad y zonas seguras (Notch) para iOS y Android -->

    <!-- Compatibilidad forzada para usar el motor de renderizado más moderno en navegadores basados en Chromium/Edge -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- ==========================================
         FAVICONS Y ICONOS PARA DISPOSITIVOS
    =========================================== -->
    <!-- Favicon estándar para navegadores -->
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/ui/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/ui/favicon-16x16.png">
    <!-- Icono para dispositivos Apple / Pantalla de inicio -->

    <meta name="msapplication-TileColor" content="#000000">

    <!-- Optimizaciones de App Web para Móviles (PWA) -->

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Masacre en Dascord página web">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    
    <!-- Enlace al manifest de la PWA -->
    <!--link rel="manifest" href="./manifest.json"-->

    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="format-detection" content="telephone=no">

<body>

    <canvas id="smokeCanvas"></canvas>
    
    <div id="vignette"></div>

    <div class="mainMenu">
